<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Login — NekoAuth</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #060a12;
      --surface:  #0d1626;
      --border:   #1a2d4a;
      --accent:   #00e5ff;
      --accent2:  #7c3aed;
      --green:    #22c55e;
      --text:     #e2e8f0;
      --muted:    #64748b;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* ── Grid background ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,229,255,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* ── Glowing orbs ── */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      pointer-events: none;
      animation: drift 8s ease-in-out infinite alternate;
    }
    .orb-1 { width: 500px; height: 500px; background: var(--accent2); top: -150px; left: -150px; }
    .orb-2 { width: 400px; height: 400px; background: var(--accent);  bottom: -120px; right: -100px; animation-delay: -4s; }

    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(30px, 20px) scale(1.05); }
    }

    /* ── Card ── */
    .card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 44px 44px;
      width: 100%;
      max-width: 420px;
      text-align: center;
      box-shadow: 0 0 60px rgba(0,229,255,.07), 0 0 0 1px rgba(0,229,255,.06) inset;
      animation: slideUp .6s cubic-bezier(.16,1,.3,1) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(32px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* top accent line */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
      border-radius: 999px;
    }

    /* ── Logo / icon ── */
    .logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 64px; height: 64px;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      border-radius: 16px;
      margin-bottom: 24px;
      font-size: 28px;
      box-shadow: 0 8px 32px rgba(124,58,237,.35);
      animation: pulse 3s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 8px 32px rgba(124,58,237,.35); }
      50%      { box-shadow: 0 8px 48px rgba(0,229,255,.45); }
    }

    h1 {
      font-size: 1.7rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 6px;
    }

    .subtitle {
      color: var(--muted);
      font-size: .9rem;
      font-family: 'Space Mono', monospace;
      margin-bottom: 36px;
    }

    /* ── Divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--muted);
      font-size: .75rem;
      font-family: 'Space Mono', monospace;
      margin-bottom: 24px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Google button ── */
    .btn-google {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 15px 20px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(255,255,255,.03);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s, border-color .2s, transform .15s, box-shadow .2s;
      position: relative;
      overflow: hidden;
    }
    .btn-google::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(0,229,255,.08), rgba(124,58,237,.08));
      opacity: 0;
      transition: opacity .2s;
    }
    .btn-google:hover {
      border-color: rgba(0,229,255,.35);
      box-shadow: 0 4px 24px rgba(0,229,255,.12);
      transform: translateY(-1px);
    }
    .btn-google:hover::after { opacity: 1; }
    .btn-google:active { transform: translateY(0); }
    .btn-google:disabled { opacity: .5; cursor: not-allowed; transform: none; }

    .btn-google svg { flex-shrink: 0; }

    /* ── Loading spinner ── */
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid rgba(255,255,255,.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Footer note ── */
    .footer-note {
      margin-top: 28px;
      font-size: .75rem;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      line-height: 1.6;
    }
    .footer-note a { color: var(--accent); text-decoration: none; }
    .footer-note a:hover { text-decoration: underline; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1e293b;
      border: 1px solid #ef4444;
      color: #fca5a5;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: .85rem;
      font-family: 'Space Mono', monospace;
      max-width: 360px;
      text-align: center;
      transition: transform .35s cubic-bezier(.16,1,.3,1);
      z-index: 999;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="card">
    <div class="logo">🐱</div>
    <h1>Selamat Datang</h1>
    <p class="subtitle">// neko-auth v1.0</p>

    <div class="divider">MASUK DENGAN</div>

    <button class="btn-google" id="loginBtn">
      <!-- Google G logo -->
      <svg width="20" height="20" viewBox="0 0 48 48">
        <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.6 32.8 29.2 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.2 7.9 3.1l5.7-5.7C34 6.5 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.2-.1-2.3-.4-3.5z"/>
        <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 15.1 19 12 24 12c3.1 0 5.8 1.2 7.9 3.1l5.7-5.7C34 6.5 29.3 4 24 4 16.3 4 9.7 8.4 6.3 14.7z"/>
        <path fill="#4CAF50" d="M24 44c5.2 0 9.8-2 13.3-5.2l-6.1-5.2C29.2 35.3 26.7 36 24 36c-5.2 0-9.5-3.2-11.3-7.8l-6.5 5C9.5 39.4 16.2 44 24 44z"/>
        <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.3 4.2-4.3 5.6l6.1 5.2C36.9 36.8 44 31 44 24c0-1.2-.1-2.3-.4-3.5z"/>
      </svg>
      <span id="btnText">Lanjutkan dengan Google</span>
      <div class="spinner" id="spinner"></div>
    </button>

    <p class="footer-note">
      Dengan masuk, kamu menyetujui<br>
      <a href="#">Syarat Layanan</a> &amp; <a href="#">Kebijakan Privasi</a> kami.
    </p>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module">
    import { initializeApp }                       from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    /* ── Firebase Config (GANTI SESUAI PROJECT MU) ── */
    const firebaseConfig = {
      apiKey:            "AIzaSyBDDV_b1K9zmxZTYs722_ma1puLpF-8qg4",
      authDomain:        "neko-auth-a8d8c.firebaseapp.com",
      projectId:         "neko-auth-a8d8c",
      storageBucket:     "neko-auth-a8d8c.firebasestorage.app",
      messagingSenderId: "379396864579",
      appId:             "1:379396864579:web:26ed98358eddada1bcb2f6",
      measurementId:     "G-RP9XL5L6P9"
    };

    const app      = initializeApp(firebaseConfig);
    const auth     = getAuth(app);
    const provider = new GoogleAuthProvider();

    const btn      = document.getElementById('loginBtn');
    const btnText  = document.getElementById('btnText');
    const spinner  = document.getElementById('spinner');
    const toast    = document.getElementById('toast');

    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 4000);
    }

    function setLoading(on) {
      btn.disabled    = on;
      btnText.style.display  = on ? 'none' : '';
      spinner.style.display  = on ? 'block' : 'none';
    }

    btn.addEventListener('click', async () => {
      setLoading(true);
      try {
        const result = await signInWithPopup(auth, provider);
        const user   = result.user;

        localStorage.setItem('neko_user', JSON.stringify({
          name:  user.displayName,
          email: user.email,
          photo: user.photoURL,
          uid:   user.uid,
          loginAt: new Date().toISOString()
        }));

        /* Redirect ke dashboard */
        window.location.href = 'dashboard.html';

      } catch (err) {
        console.error(err);
        const msg = err.code === 'auth/popup-closed-by-user'
          ? 'Popup ditutup. Coba lagi.'
          : 'Login gagal: ' + err.message;
        showToast(msg);
        setLoading(false);
      }
    });
  </script>

</body>
</html>
